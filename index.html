<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>アニメ評価ランキング</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700;900&family=JetBrains+Mono:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-database-compat.js"></script>
<style>
  :root{
    --bg: #0d0f16;
    --bg-alt: #12141d;
    --panel: #171a24;
    --panel-2: #1e222e;
    --line: #2a2f3d;
    --text: #e8e9ee;
    --text-dim: #8890a3;
    --gold: #e7b94c;
    --silver: #b9c0cf;
    --bronze: #c98a52;
    --accent: #6fd0c5;
    --danger: #e2685c;
    --note: #d99b3f;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: radial-gradient(1200px 600px at 50% -10%, #171b28 0%, var(--bg) 55%);
    color: var(--text);
    font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    padding-bottom: 96px;
  }
  .header{
    position: sticky; top:0; z-index: 20;
    background: rgba(13,15,22,0.88);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
    padding: 14px 16px 12px;
  }
  .brand{
    display:flex; align-items:baseline; gap:8px; margin-bottom:10px;
  }
  .brand h1{
    font-family:'Zen Kaku Gothic New', sans-serif;
    font-weight: 900;
    font-size: 19px;
    letter-spacing: 0.02em;
    margin:0;
    background: linear-gradient(90deg, var(--gold), #fff2cf 60%, var(--gold));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .brand .count{
    font-family:'JetBrains Mono', monospace;
    font-size:12px; color:var(--text-dim);
  }
  .controls{ display:flex; gap:8px; }
  .search{
    flex:1;
    background: var(--panel);
    border:1px solid var(--line);
    border-radius: 10px;
    padding: 9px 12px;
    color: var(--text);
    font-size: 14px;
  }
  .search::placeholder{ color: var(--text-dim); }
  .search:focus, select:focus, textarea:focus, input:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
  select.sortsel{
    background: var(--panel);
    border:1px solid var(--line);
    color: var(--text);
    border-radius: 10px;
    padding: 9px 8px;
    font-size: 13px;
    max-width: 108px;
  }
  .sortdir{
    flex: 0 0 auto;
    width: 38px;
    background: var(--panel);
    border:1px solid var(--line);
    color: var(--gold);
    border-radius: 10px;
    font-size: 15px;
    font-weight:700;
    cursor:pointer;
  }
  .sortdir:active{ border-color: var(--accent); }
  .list{ padding: 8px 10px; display:flex; flex-direction:column; gap:5px; }
  .empty{
    text-align:center; color:var(--text-dim); padding: 60px 20px; font-size:14px; line-height:1.8;
  }
  .card{
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 11px;
    padding: 7px 10px;
    transition: border-color .15s ease, background .15s ease;
  }
  .card:active{ border-color: var(--accent); }
  .card.highlight{
    background: #1f2a30;
    border-color: var(--accent);
  }
  .card-top{ display:flex; align-items:center; gap:9px; }
  .badge{
    flex: 0 0 auto;
    width: 30px; height: 30px;
    border-radius: 8px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    font-family:'JetBrains Mono', monospace;
    font-weight:700;
    font-size: 12px;
    line-height: 1;
    background: #23273350;
    border: 1px solid var(--line);
    color: var(--text-dim);
    cursor: pointer;
  }
  .badge:active{ transform: scale(0.92); }
  .badge.r1{ background: linear-gradient(160deg,#3a3115,#4b3d16); border-color: var(--gold); color: var(--gold); }
  .badge.r2{ background: linear-gradient(160deg,#2b2e36,#383c47); border-color: var(--silver); color: var(--silver); }
  .badge.r3{ background: linear-gradient(160deg,#332415,#402c17); border-color: var(--bronze); color: var(--bronze); }
  .badge .suf{ font-size:7px; opacity:.75; margin-top:0px; }
  .card-main{ flex:1; min-width:0; display:flex; align-items:center; gap:6px; }
  .title{
    font-size: 13.5px; font-weight:500; color: var(--text);
    white-space: nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .subrow{ display:flex; gap:6px; margin-top:3px; flex-wrap:wrap; }
  .pill{
    font-size: 10.5px; color: var(--text-dim);
    background: var(--panel-2);
    border-radius: 6px;
    padding: 1px 6px;
    font-family: 'JetBrains Mono', monospace;
    flex: 0 0 auto;
  }
  .pill.note{ color: var(--note); border:1px solid #4a3a1c; background:#241d10; }
  .total-box{
    flex: 0 0 auto; text-align:right; min-width: 34px;
  }
  .total{
    font-family:'JetBrains Mono', monospace;
    font-weight:700; font-size: 16px; color: var(--gold);
    line-height:1;
  }
  .total-label{ display:none; }
  .detail{
    margin-top:10px; padding-top:10px; border-top: 1px dashed var(--line);
    display:none;
  }
  .card.open .detail{ display:block; }
  .scoregrid{
    display:grid; grid-template-columns: repeat(5, 1fr); gap:6px; margin-bottom:10px;
  }
  .scorecell{ text-align:center; background:var(--panel-2); border-radius:8px; padding:6px 2px; }
  .scorecell .k{ font-size:9.5px; color:var(--text-dim); }
  .scorecell .v{ font-family:'JetBrains Mono', monospace; font-size:13px; margin-top:2px; }
  .scorecell .v.hi{ color: #e2685c; font-weight:700; }
  .menu-btn{
    flex: 0 0 auto;
    width: 26px; height: 26px;
    background: transparent; border: none;
    color: var(--text-dim);
    font-size: 18px; line-height:1;
    cursor: pointer;
    border-radius: 6px;
  }
  .menu-btn:active{ background: var(--panel-2); }
  .linkrow{ margin-bottom:8px; }
  .linkrow a{ color: var(--accent); font-size:12px; text-decoration:none; }
  .linkrow a:hover{ text-decoration:underline; }
  .actions{ display:flex; gap:8px; }
  .btn{
    flex:1; border:none; border-radius:9px; padding:9px 0; font-size:13px; font-weight:500;
    cursor:pointer;
  }
  .btn.edit{ background: var(--panel-2); color: var(--text); border:1px solid var(--line); }
  .btn.del{ background: #2a1614; color: var(--danger); border:1px solid #4a2622; }

  .fab{
    position: fixed; right: 18px; bottom: 22px; z-index: 30;
    width: 56px; height:56px; border-radius: 50%;
    background: linear-gradient(150deg, var(--gold), #c98f2e);
    color:#241a05; border:none; font-size:28px; font-weight:700;
    box-shadow: 0 8px 24px rgba(231,185,76,0.35);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
  }
  .fab:active{ transform: scale(0.94); }

  .sheet-overlay{
    position: fixed; inset:0; background: rgba(6,7,11,0.72);
    display:none; align-items:flex-end; z-index: 40;
  }
  .sheet-overlay.show{ display:flex; }
  .sheet{
    background: var(--bg-alt);
    border: 1px solid var(--line);
    border-bottom:none;
    border-radius: 18px 18px 0 0;
    width:100%; max-height: 88vh; overflow-y:auto;
    padding: 16px 16px calc(20px + env(safe-area-inset-bottom));
  }
  .sheet-handle{ width:36px; height:4px; background:var(--line); border-radius:2px; margin: 0 auto 14px; }
  .sheet h2{ font-family:'Zen Kaku Gothic New', sans-serif; font-size:16px; margin:0 0 14px; }
  .field{ margin-bottom: 12px; }
  .field label{ display:block; font-size:11.5px; color:var(--text-dim); margin-bottom:5px; }
  .field input, .field textarea{
    width:100%; background: var(--panel); border:1px solid var(--line); border-radius:9px;
    padding: 10px 11px; color:var(--text); font-size:14px; font-family: inherit;
  }
  .row5{ display:grid; grid-template-columns: repeat(5,1fr); gap:6px; }
  .row5 .field input{ padding:9px 4px; text-align:center; font-family:'JetBrains Mono', monospace; }
  .row5 label{ text-align:center; }
  .sheet-actions{ display:flex; gap:10px; margin-top: 6px; }
  .sheet-actions button{
    flex:1; padding: 12px 0; border-radius:10px; border:none; font-size:14px; font-weight:700; cursor:pointer;
  }
  .save-btn{ background: var(--gold); color:#241a05; }
  .cancel-btn{ background: var(--panel-2); color:var(--text); border:1px solid var(--line) !important; }
  .required::after{ content:" *"; color: var(--danger); }
  .total-input-row{ display:flex; gap:8px; }
  .total-input-row input{ flex:1; }
  .calc-btn{
    flex: 0 0 auto;
    background: var(--panel-2);
    border: 1px solid var(--line);
    color: var(--accent);
    border-radius: 9px;
    padding: 0 14px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
  }
  .calc-btn:active{ border-color: var(--accent); }
  .menu-sheet{ padding-bottom: calc(16px + env(safe-area-inset-bottom)); }
  .menu-item{
    display:block; width:100%; text-align:center;
    background: var(--panel); border: 1px solid var(--line);
    color: var(--text); font-size: 15px; font-weight:500;
    border-radius: 10px; padding: 13px 0; margin-bottom: 8px; cursor:pointer;
  }
  .menu-item.danger{ color: var(--danger); }
  .menu-item.cancel{ color: var(--text-dim); background: transparent; border-color: transparent; margin-bottom:0; }
  .toast{
    position:fixed; left:50%; bottom:100px; transform: translateX(-50%);
    background: var(--panel-2); border:1px solid var(--line); color:var(--text);
    padding:8px 16px; border-radius:20px; font-size:12.5px; z-index:50;
    opacity:0; pointer-events:none; transition: opacity .2s ease;
  }
  .toast.show{ opacity:1; }
</style>
</head>
<body>

<div class="header">
  <div class="brand">
    <h1>アニメ評価ランキング</h1>
    <span class="count" id="count">153作品</span>
  </div>
  <div class="controls">
    <input class="search" id="search" placeholder="作品名で検索..." />
    <select class="sortsel" id="sortsel">
      <option value="total">合計</option>
      <option value="char">キャラクター</option>
      <option value="scenario">シナリオ</option>
      <option value="art">作画</option>
      <option value="tempo">テンポ感</option>
      <option value="other">その他</option>
      <option value="title">作品名</option>
      <option value="order">追加順</option>
    </select>
    <button class="sortdir" id="sortdir" aria-label="並び順を反転" title="並び順を反転">↓</button>
  </div>
</div>

<div class="list" id="list"></div>

<button class="fab" id="fabAdd" aria-label="追加">＋</button>

<div class="sheet-overlay" id="overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2 id="sheetTitle">新しい作品を追加</h2>
    <div class="field">
      <label class="required">作品名</label>
      <input id="f_title" placeholder="例: 〇〇・2期" />
    </div>
    <div class="row5">
      <div class="field"><label>キャラ</label><input id="f_char" placeholder="19"></div>
      <div class="field"><label>シナリオ</label><input id="f_scenario" placeholder="19"></div>
      <div class="field"><label>作画</label><input id="f_art" placeholder="19"></div>
      <div class="field"><label>テンポ</label><input id="f_tempo" placeholder="19"></div>
      <div class="field"><label>その他</label><input id="f_other" placeholder="19"></div>
    </div>
    <div class="field">
      <label class="required">合計</label>
      <div class="total-input-row">
        <input id="f_total" placeholder="例: 95" inputmode="decimal" />
        <button type="button" id="autoCalcBtn" class="calc-btn">自動計算</button>
      </div>
    </div>
    <div class="field">
      <label>備考</label>
      <input id="f_note" placeholder="例: 点数上方修正" />
    </div>
    <div class="field">
      <label>評価リンク(URL)</label>
      <input id="f_link" placeholder="https://..." />
    </div>
    <div class="sheet-actions">
      <button class="cancel-btn" id="cancelBtn">キャンセル</button>
      <button class="save-btn" id="saveBtn">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="sheet-overlay" id="pcOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2>編集用パスコード</h2>
    <div class="field">
      <label>追加・編集・削除にはパスコードが必要です</label>
      <input id="f_passcode" type="text" autocomplete="off" autocapitalize="off" autocorrect="off" placeholder="パスコードを入力" />
    </div>
    <div class="sheet-actions">
      <button class="cancel-btn" id="pcCancel">キャンセル</button>
      <button class="save-btn" id="pcOk">確認</button>
    </div>
  </div>
</div>

<div class="sheet-overlay" id="menuOverlay">
  <div class="sheet menu-sheet">
    <div class="sheet-handle"></div>
    <button class="menu-item" id="menuEdit">編集する</button>
    <button class="menu-item danger" id="menuDelete">削除する</button>
    <button class="menu-item cancel" id="menuCancel">キャンセル</button>
  </div>
</div>

function parseNum(v){
  if(v === null || v === undefined) return null;
  const m = String(v).match(/-?\d+(\.\d+)?/);
  return m ? parseFloat(m[0]) : null;
}

function computeRanks(list){
  const withTotal = list.map(e => ({...e, _t: parseNum(e.total) ?? -Infinity}));
  const sortedByTotal = [...withTotal].sort((a,b)=> b._t - a._t);
  const rankMap = {};
  let rank = 0, seen = 0, lastT = null;
  for(const e of sortedByTotal){
    seen++;
    if(e._t !== lastT){ rank = seen; lastT = e._t; }
    rankMap[e.id] = rank;
  }
  return rankMap;
}

const NUMERIC_FIELDS = ['total','char','scenario','art','tempo','other'];

function sortList(list, field, dir){
  const arr = [...list];
  if(NUMERIC_FIELDS.includes(field)){
    return arr.sort((a,b)=>{
      const av = parseNum(a[field]), bv = parseNum(b[field]);
      const aa = av===null? -Infinity: av, bb = bv===null? -Infinity: bv;
      return dir==='asc' ? aa-bb : bb-aa;
    });
  }
  if(field === 'order'){
    return arr.sort((a,b)=> dir==='asc' ? a.order-b.order : b.order-a.order);
  }
  // title
  return arr.sort((a,b)=> dir==='asc' ? a.title.localeCompare(b.title,'ja') : b.title.localeCompare(a.title,'ja'));
}

function render(){
  const q = searchEl.value.trim().toLowerCase();
  const field = sortEl.value;
  const rankMap = computeRanks(entries);

  let filtered = entries.filter(e => !q || e.title.toLowerCase().includes(q));
  filtered = sortList(filtered, field, sortDir);

  countEl.textContent = `${entries.length}作品${q ? ` / ${filtered.length}件表示` : ''}`;

  if(filtered.length === 0){
    listEl.innerHTML = `<div class="empty">見つかりませんでした。<br>検索語を変えてみてください。</div>`;
    return;
  }

  listEl.innerHTML = filtered.map(e => {
    const rank = rankMap[e.id];
    const badgeCls = rank===1 ? 'r1' : rank===2 ? 'r2' : rank===3 ? 'r3' : '';
    const pills = [
      ['キャラ', e.char], ['シナリオ', e.scenario], ['作画', e.art], ['テンポ', e.tempo], ['他', e.other]
    ];
    const isHigh = (v) => { const s = String(v).trim(); return s === '20' || s === '20+'; };
    return `
    <div class="card" data-id="${e.id}">
      <div class="card-top" data-toggle="${e.id}">
        <div class="badge ${badgeCls}" data-badge="${e.id}">${rank}<span class="suf">位</span></div>
        <div class="card-main">
          <div class="title">${escapeHtml(e.title)}</div>
          ${e.note ? `<span class="pill note">${escapeHtml(e.note)}</span>` : ''}
        </div>
        <div class="total-box">
          <div class="total">${escapeHtml(String(e.total))}</div>
          <div class="total-label">合計</div>
        </div>
        <button class="menu-btn" data-menu="${e.id}" aria-label="メニュー">⋮</button>
      </div>
      <div class="detail">
        <div class="scoregrid">
          ${pills.map(([k,v])=>`<div class="scorecell"><div class="k">${k}</div><div class="v${v!=='' && isHigh(v) ? ' hi' : ''}">${v===''?'—':escapeHtml(String(v))}</div></div>`).join('')}
        </div>
        ${e.link ? `<div class="linkrow"><a href="${escapeAttr(e.link)}" target="_blank" rel="noopener">評価リンクを開く ↗</a></div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function escapeHtml(s){
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(s){ return escapeHtml(s); }

let menuTargetId = null;
const menuOverlay = $('#menuOverlay');

function closeMenu(){ menuOverlay.classList.remove('show'); menuTargetId = null; }

listEl.addEventListener('click', (ev) => {
  const badge = ev.target.closest('[data-badge]');
  const toggle = ev.target.closest('[data-toggle]');
  const menuBtn = ev.target.closest('[data-menu]');
  if(menuBtn){
    ev.stopPropagation();
    menuTargetId = menuBtn.dataset.menu;
    menuOverlay.classList.add('show');
    return;
  }
  if(badge){
    ev.stopPropagation();
    const card = badge.closest('.card');
    if(card.classList.contains('open')){
      card.classList.toggle('highlight');
    } else {
      card.classList.add('open');
    }
    return;
  }
  if(toggle){
    const card = toggle.closest('.card');
    card.classList.toggle('open');
  }
});

});

function openSheet(){ overlay.classList.add('show'); }
function closeSheet(){ overlay.classList.remove('show'); clearForm(); editingId = null; }

function clearForm(){
  ['title','char','scenario','art','tempo','other','total','note','link'].forEach(k=>{
    $('#f_'+k).value = '';
  });
}

$('#fabAdd').addEventListener('click', () => {
  requireUnlock(() => {
    editingId = null;
    $('#sheetTitle').textContent = '新しい作品を追加';
    clearForm();
    openSheet();
  });
});
$('#cancelBtn').addEventListener('click', closeSheet);
overlay.addEventListener('click', (ev)=>{ if(ev.target === overlay) closeSheet(); });

function openEdit(id){
  const e = entries.find(x=>x.id===id);
  if(!e) return;
  editingId = id;
  $('#sheetTitle').textContent = '編集';
  $('#f_title').value = e.title;
  $('#f_char').value = e.char;
  $('#f_scenario').value = e.scenario;
  $('#f_art').value = e.art;
  $('#f_tempo').value = e.tempo;
  $('#f_other').value = e.other;
  $('#f_total').value = e.total;
  $('#f_note').value = e.note;
  $('#f_link').value = e.link;
  openSheet();
}

async function removeEntry(id){
  if(!confirm('この作品を削除しますか？')) return;
  entries = entries.filter(e=>e.id!==id);
  await persist();
  render();
  toast('削除しました');
}

$('#autoCalcBtn').addEventListener('click', () => {
  const keys = ['f_char','f_scenario','f_art','f_tempo','f_other'];
  let sum = 0;
  for(const k of keys){
    const n = parseNum($('#'+k).value);
    if(n !== null) sum += n;
  }
  $('#f_total').value = sum;
  toast('自動計算しました(必要なら調整してください)');
});

$('#saveBtn').addEventListener('click', async () => {
  const title = $('#f_title').value.trim();
  const totalRaw = $('#f_total').value.trim();
  if(!title){ toast('作品名を入力してください'); return; }
  if(totalRaw === '' || parseNum(totalRaw) === null){ toast('合計点を入力してください'); return; }

  if(editingId){
    const e = entries.find(x=>x.id===editingId);
    e.title = title;
    e.char = $('#f_char').value.trim();
    e.scenario = $('#f_scenario').value.trim();
    e.art = $('#f_art').value.trim();
    e.tempo = $('#f_tempo').value.trim();
    e.other = $('#f_other').value.trim();
    e.total = parseNum(totalRaw);
    e.note = $('#f_note').value.trim();
    e.link = $('#f_link').value.trim();
    toast('更新しました');
  } else {
    const maxOrder = entries.reduce((m,e)=>Math.max(m,e.order??0), 0);
    entries.push({
      id: 'e-' + Date.now() + '-' + Math.floor(Math.random()*1000),
      title,
      char: $('#f_char').value.trim(),
      scenario: $('#f_scenario').value.trim(),
      art: $('#f_art').value.trim(),
      tempo: $('#f_tempo').value.trim(),
      other: $('#f_other').value.trim(),
      total: parseNum(totalRaw),
      note: $('#f_note').value.trim(),
      link: $('#f_link').value.trim(),
      order: maxOrder + 1
    });
    toast('追加しました');
  }
  await persist();
  closeSheet();
  render();
});

(async function init(){
  await loadEntries();
  render();
})();
</script>
</body>
</html>
